      <main>
        <section id="prova" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">A EVA sugere, seu time aprova</h2>
          <ul style="padding-left:20px;color:#222;">
            <li><strong>Onde a conversa acontece.</strong> A EVA trabalha no canal em que seus leads já falam com sua agência.</li>
            <li><strong>Aprovação humana.</strong> Nenhuma sugestão é enviada sem o ok do seu time.</li>
            <li><strong>Playbook da agência.</strong> Cada resposta segue o contexto, a oferta e o processo comercial da operação.</li>
          </ul>
        </section>

        <section id="eva" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">Veja a EVA em ação</h2>
          <p style="color:#444;margin:0;">Entenda como ela lê a conversa, sugere o próximo passo e mantém seu time no controle.</p>
        </section>

        <section id="funcionalidades" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">A EVA acompanha cada etapa da conversa</h2>
          <p style="color:#444;margin:0 0 16px;">Da primeira mensagem ao fechamento, ela entende o contexto, sugere o próximo passo e ajuda seu time a vender com mais consistência.</p>

          <h3 style="font-size:18px;margin:20px 0 4px;">Ajude sua equipe a responder melhor cada lead</h3>
          <p style="color:#444;margin:0 0 8px;">A EVA lê a conversa, entende o momento do lead e sugere uma resposta clara para avançar o atendimento.</p>
          <ul style="padding-left:20px;color:#222;">
            <li>Entende o contexto da conversa.</li>
            <li>Sugere uma resposta pronta para revisão.</li>
            <li>Mantém aprovação humana antes do envio.</li>
          </ul>

          <h3 style="font-size:18px;margin:20px 0 4px;">Saiba quais conversas merecem atenção agora</h3>
          <p style="color:#444;margin:0 0 8px;">A EVA identifica sinais de compra, dúvidas comerciais e oportunidades que podem passar despercebidas no WhatsApp.</p>
          <ul style="padding-left:20px;color:#222;">
            <li>Identifica intenção comercial.</li>
            <li>Diferencia curiosidade de oportunidade real.</li>
            <li>Ajuda o time a priorizar atendimentos.</li>
          </ul>

          <h3 style="font-size:18px;margin:20px 0 4px;">Transforme seu processo comercial em próximos passos</h3>
          <p style="color:#444;margin:0 0 8px;">A EVA usa o contexto da sua operação para sugerir respostas alinhadas ao jeito certo de vender da agência.</p>
          <ul style="padding-left:20px;color:#222;">
            <li>Padroniza a condução comercial.</li>
            <li>Ajuda novos vendedores a seguir o processo.</li>
            <li>Reduz respostas desalinhadas.</li>
          </ul>
        </section>

        <section id="especialistas" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">Crie especialistas para cada etapa da conversa</h2>
          <p style="color:#444;margin:0 0 16px;">No Vyzon, a EVA pode assumir papéis específicos para qualificar leads, sugerir follow-ups, preparar próximos passos e apoiar seu time em cada momento da jornada comercial.</p>
          <ul style="padding-left:20px;color:#222;">
            <li><strong>Qualificação.</strong> Identifica intenção, contexto e estágio do lead antes de sugerir o próximo passo.</li>
            <li><strong>Follow-up.</strong> Ajuda seu time a retomar conversas no momento certo, com abordagem alinhada ao histórico.</li>
            <li><strong>Propostas e próximos passos.</strong> Transforma o playbook comercial da agência em sugestões práticas para avançar cada oportunidade.</li>
          </ul>
        </section>

        <section id="planos" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">Preço simples e transparente</h2>
          <p style="color:#444;margin:0 0 16px;">Comece com 14 dias grátis, sem cartão. Cresça quando seu time crescer. Assinatura mensal, cancele quando quiser. Pagamento via Mercado Pago.</p>

          <h3 style="font-size:18px;margin:20px 0 4px;">Starter — R$ 147/mês</h3>
          <p style="color:#444;margin:0 0 6px;">Para estruturar o primeiro fluxo comercial.</p>
          <ul style="padding-left:20px;color:#222;">
            <li>1 vendedor/closer + 1 admin</li>
            <li>WhatsApp conectado</li>
            <li>Inbox Comercial</li>
            <li>Pipeline com agendamentos</li>
            <li>EVA sugerindo respostas e próximos passos</li>
            <li>Suporte humano no WhatsApp</li>
          </ul>

          <h3 style="font-size:18px;margin:20px 0 4px;">Plus — R$ 397/mês (mais popular)</h3>
          <p style="color:#444;margin:0 0 6px;">Para agências que recebem leads todos os dias.</p>
          <ul style="padding-left:20px;color:#222;">
            <li>3 SDRs/closers + 1 admin</li>
            <li>Tudo do Starter</li>
            <li>EVA analisando intenção, fit, urgência e objeções</li>
            <li>Ranking e metas do time</li>
            <li>Relatórios completos</li>
            <li>Integrações Hotmart, Kiwify e Mercado Pago</li>
          </ul>
          <p style="color:#555;margin:6px 0 0;font-size:13px;">+R$ 49,97/SDR adicional. Ligações como add-on.</p>

          <h3 style="font-size:18px;margin:20px 0 4px;">Pro — R$ 797/mês</h3>
          <p style="color:#444;margin:0 0 6px;">Para agências com operação comercial em escala.</p>
          <ul style="padding-left:20px;color:#222;">
            <li>8 SDRs/closers + 3 admins</li>
            <li>Tudo do Plus</li>
            <li>EVA com prioridade e limite ampliado</li>
            <li>Multiempresa: matriz + braços</li>
            <li>Ligações com transcrição e resumo do deal</li>
            <li>Integrações completas (Stripe e mais)</li>
            <li>Suporte prioritário</li>
          </ul>
          <p style="color:#555;margin:6px 0 0;font-size:13px;">+R$ 48,99/SDR adicional. Falar com especialista.</p>
        </section>

        <section id="como-funciona" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">Coloque a EVA para operar sem mudar seu processo</h2>
          <p style="color:#444;margin:0 0 16px;">Conecte seus canais, ajuste o playbook comercial e comece a revisar sugestões com seu time.</p>
          <ul style="padding-left:20px;color:#222;">
            <li><strong>01. Conecte seu WhatsApp e seus canais.</strong> Ligamos a EVA aos canais onde seus atendimentos já acontecem.</li>
            <li><strong>02. Ajuste o playbook da agência.</strong> Defina etapas, critérios, tom de voz e próximos passos comerciais.</li>
            <li><strong>03. Revise sugestões com seu time.</strong> A EVA sugere respostas e ações. A aprovação continua com quem conduz a venda.</li>
          </ul>
          <p style="color:#222;margin:16px 0 0;">14 dias grátis, sem cartão.</p>

          <p style="color:#222;margin:0;">Não. A EVA sugere respostas e próximos passos, mas o envio depende da aprovação do seu time. A ideia é acelerar a operação sem tirar o controle humano.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">A EVA substitui meu time comercial?</h3>
          <p style="color:#222;margin:0;">Não. Ela funciona como uma camada de apoio para ajudar o time a entender contexto, responder melhor e seguir o playbook comercial da agência.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Funciona com WhatsApp?</h3>
          <p style="color:#222;margin:0;">Sim. A proposta da EVA é acompanhar conversas comerciais que já acontecem no WhatsApp e transformar esse contexto em sugestões práticas para o time.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Preciso mudar meu processo comercial?</h3>
          <p style="color:#222;margin:0;">Não necessariamente. A EVA deve se adaptar ao processo da agência: etapas, ofertas, critérios de qualificação, tom de voz e próximos passos.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Serve para qualquer empresa?</h3>
          <p style="color:#222;margin:0;">A Vyzon está sendo pensada principalmente para agências e operações comerciais que vendem por conversa, especialmente onde o WhatsApp concentra boa parte do atendimento.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Como funciona a implantação?</h3>
          <p style="color:#222;margin:0;">Na demo, entendemos seu fluxo comercial, canais, volume de atendimentos e playbook atual. A partir disso, avaliamos como a EVA pode entrar na operação sem bagunçar o processo.</p>
