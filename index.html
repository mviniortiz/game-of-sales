        <section id="problema" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">Sua agência gera lead. Mas a oportunidade se perde no caminho.</h2>
          <p style="color:#444;margin:0 0 16px;">Agência que vende por conversa vive do WhatsApp. Quando o atendimento não é organizado, o lead esfria, a resposta atrasa e a oportunidade some no meio das mensagens.</p>
          <ul style="padding-left:20px;color:#222;">
            <li><strong>Lead quente fica sem resposta.</strong> A pessoa chega interessada, ninguém responde a tempo e ela vai pro concorrente.</li>
            <li><strong>Follow-up depende de cobrança no grupo.</strong> O retorno fica na memória do vendedor, e a oportunidade evapora sem aviso.</li>
            <li><strong>Pipeline não acompanha o que aconteceu no WhatsApp.</strong> O que foi falado na conversa não chega no funil, e o gestor não enxerga onde a venda travou.</li>
            <li><strong>Você só descobre que o lead esfriou quando já era.</strong> Sem leitura da conversa, o sinal de esfriamento aparece tarde demais.</li>
          </ul>
          <p style="color:#222;margin:16px 0 0;">O Vyzon centraliza os atendimentos e, com a EVA, transforma cada conversa em <strong>oportunidade no pipeline</strong>.</p>
        </section>

        <section id="mecanismo" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">Da conversa ao pipeline, com a EVA do seu lado</h2>
          <p style="color:#444;margin:0 0 16px;">Uma central comercial onde o atendimento, a leitura da conversa e o funil ficam conectados. A EVA sugere, seu time aprova.</p>
          <ul style="padding-left:20px;color:#222;">
            <li><strong>Inbox comercial:</strong> centraliza os atendimentos do WhatsApp e de outros canais em um lugar só.</li>
            <li><strong>EVA, IA comercial:</strong> lê a conversa, entende o contexto, qualifica o lead e sugere o próximo passo e a resposta.</li>
            <li><strong>Priorização:</strong> mostra qual conversa resolver primeiro, do lead mais quente ao follow-up atrasado.</li>
            <li><strong>Conversa vira oportunidade:</strong> em um clique a conversa entra no pipeline, sem planilha paralela.</li>
            <li><strong>Pipeline visual:</strong> enxergue onde cada oportunidade travou, com a conversa e a leitura da EVA junto.</li>
            <li><strong>Agentes especialistas:</strong> crie versões da EVA focadas em cada etapa comercial (qualificação, follow-up, propostas) com o playbook da agência, sempre com aprovação humana.</li>
            <li><strong>Agenda e follow-up:</strong> os próximos passos aparecem na hora certa.</li>
          </ul>
        </section>

          <p style="color:#444;margin:0 0 16px;">Agências e times comerciais que recebem leads no WhatsApp e precisam atender rápido, qualificar e não deixar oportunidade esfriar.</p>
          <ul style="padding-left:20px;color:#222;">
            <li>
              <strong>Agências de marketing.</strong> Centralize os atendimentos de cada cliente, qualifique os leads com a EVA e mostre o pipeline em tempo real.
              <a href="#agendar-demo" style="color:#1556C0;">Agendar demo gratuita</a>.
            </li>
            <li>
              <strong>Infoprodutores e mentorias.</strong> Organize os atendimentos de closers e leads de produtos digitais em um fluxo previsível.
            </li>
            <li>
              <strong>Times SDR/Closer B2B.</strong> Organize prospecção, qualificação e oportunidades em um fluxo simples para o time usar.
            </li>
          </ul>
        </section>

        <section id="faq" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">Perguntas frequentes</h2>
          <h3 style="font-size:16px;margin:16px 0 4px;">O que é o Vyzon?</h3>
          <p style="color:#222;margin:0;">Vyzon é uma Central Comercial com EVA para agências que vendem por conversa. Ele organiza Inbox, Pipeline, Central de Comando e IA comercial assistida para ajudar seu time a priorizar leads e transformar atendimento em oportunidade.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">O que é EVA?</h3>
          <p style="color:#222;margin:0;">EVA é a IA comercial do Vyzon. Ela entende o contexto da agência, analisa conversas e sugere próximos passos para o time agir com mais clareza.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">A EVA responde sozinha meus leads?</h3>
          <p style="color:#222;margin:0;">Não por padrão. A EVA analisa e sugere respostas, próximos passos e prioridades. Seu time aprova antes de qualquer ação.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">O Vyzon substitui meu vendedor?</h3>
          <p style="color:#222;margin:0;">Não. O Vyzon ajuda o vendedor a agir melhor. A decisão continua com o time.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">A EVA aprende com os materiais da minha agência?</h3>
          <p style="color:#222;margin:0;">Sim. Você pode adicionar serviços, FAQs, objeções, ICP e playbooks para a EVA usar como contexto. Nada é aplicado sem aprovação.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Preciso trocar meu número de WhatsApp atual?</h3>
          <p style="color:#222;margin:0;">Não. Você conecta o número que sua agência já usa, direto por QR code, e continua atendendo normalmente. O Vyzon organiza essas conversas na Inbox Comercial.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Quanto tempo leva para configurar?</h3>
          <p style="color:#222;margin:0;">A conexão do WhatsApp leva poucos minutos. Pipeline e time você monta no mesmo dia, e o contexto da EVA pode começar simples e crescer com o uso. Na demo, a gente mostra esse caminho com o seu cenário.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Preciso abandonar meu CRM ou planilha atual?</h3>
          <p style="color:#222;margin:0;">Não de imediato. O Vyzon organiza o atendimento e o pipeline das conversas. Muitas operações começam por aí e trazem o restante do processo no próprio ritmo.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Quem vê minhas conversas e dados?</h3>
          <p style="color:#222;margin:0;">Só o seu time. Os dados de cada agência ficam isolados na própria conta, e a EVA usa as conversas apenas para gerar análises e sugestões dentro da sua operação.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">O que acontece se eu cancelar?</h3>
          <p style="color:#222;margin:0;">Você pode cancelar quando quiser, direto na plataforma, sem fidelidade. Seu número de WhatsApp continua seu e pode ser desconectado a qualquer momento.</p>
