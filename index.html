        <section id="problema" style="margin:0 0 40px;">
          <h2 style="font-size:24px;margin:0 0 8px;">Seu CRM virou só mais uma ferramenta que o vendedor ignora?</h2>
          <p style="color:#444;margin:0 0 16px;">Time comercial vive de ritmo, meta e clareza. Quando o CRM não entrega isso, a operação volta pra planilha, print e cobrança no WhatsApp.</p>
          <ul style="padding-left:20px;color:#222;">
            <li><strong>O time não atualiza o CRM.</strong> Vendedor entra, faz reunião, fecha proposta — e nada vai pro sistema. Pipeline vira ficção.</li>
            <li><strong>O gestor cobra tudo no WhatsApp.</strong> Status de deal, follow-up, meta — tudo vira mensagem solta no grupo. Cobrança vira rotina, não gestão.</li>
            <li><strong>O ranking é manual.</strong> Alguém compila planilha no fim do mês e dispara um print. Quando chega, já não muda comportamento.</li>
            <li><strong>A meta só aparece no fim do mês.</strong> Quando o time descobre que está abaixo do ritmo, faltam 3 dias úteis. Tarde demais pra reagir.</li>
            <li><strong>Follow-ups se perdem.</strong> Lead esfria, retorno cai pra próxima semana, próxima semana vira nunca. Oportunidade evapora sem aviso.</li>
            <li><strong>O pipeline não mostra a realidade.</strong> Deals parados há semanas continuam abertos. O forecast vira ficção e ninguém confia nos números.</li>
          </ul>
          <p style="color:#222;margin:16px 0 0;">A Vyzon transforma a rotina comercial em uma experiência <strong>clara, visual e orientada por metas</strong>.</p>
        </section>

          <ul style="padding-left:20px;color:#222;">
            <li><strong>Pipeline visual:</strong> enxergue onde cada oportunidade travou.</li>
            <li><strong>Ranking ao vivo:</strong> o vendedor sabe onde está; o gestor sabe quem precisa de atenção.</li>
            <li><strong>Metas individuais e por equipe:</strong> acompanhe o ritmo antes do fim do mês.</li>
            <li><strong>Automações de vendas:</strong> reduz tarefas manuais e follow-ups esquecidos.</li>
            <li><strong>Gestão de follow-up:</strong> alertas e tarefas que aparecem na hora certa.</li>
            <li><strong>Dashboard do gestor:</strong> faturamento, ticket médio, taxa de conversão e show rate em tempo real.</li>
            <li><strong>Visão do vendedor:</strong> meta, pipeline pessoal e progresso no ranking.</li>
            <li><strong>Integrações:</strong> centraliza dados das plataformas que sua operação já usa.</li>
          </ul>
        </section>

              <strong>Infoprodutores e mentorias.</strong> Controle closers, leads, follow-ups e vendas de produtos digitais com uma rotina comercial mais previsível.
              <a href="/para-infoprodutores" style="color:#0a7a45;">Ver aplicação para infoprodutores</a>.
            </li>
            <li>
              <strong>Agências e coprodutoras.</strong> Acompanhe múltiplas operações, campanhas e times comerciais com metas, ranking e pipeline em tempo real.
              <a href="#agendar-demo" style="color:#0a7a45;">Falar com a gente (em breve)</a>.
            </li>
            <li>
              <strong>Indústrias e distribuidoras.</strong> Dê mais visibilidade para vendedores, representantes, carteiras e oportunidades B2B.
              <a href="#agendar-demo" style="color:#0a7a45;">Falar com a gente (em breve)</a>.
            </li>

          <h2 style="font-size:24px;margin:0 0 8px;">Perguntas frequentes</h2>
          <h3 style="font-size:16px;margin:16px 0 4px;">A Vyzon é só para infoprodutores?</h3>
          <p style="color:#222;margin:0;">Não. A Vyzon atende times comerciais que precisam de mais adesão ao CRM, clareza de metas e gestão de pipeline. Infoprodutores, agências, indústrias, distribuidoras e times B2B (SDR/Closer) podem usar a plataforma.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">O que significa CRM gamificado?</h3>
          <p style="color:#222;margin:0;">Significa transformar metas, ranking, tarefas e evolução comercial em uma experiência mais visual e engajadora, para que o time acompanhe a própria performance diariamente — em vez de depender de planilha, print e cobrança no WhatsApp.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Preciso substituir meu processo comercial atual?</h3>
          <p style="color:#222;margin:0;">Não necessariamente. A Vyzon organiza pipeline, metas e rotina comercial com integrações e fluxos que podem ser adaptados ao processo existente.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Quanto tempo leva pra configurar?</h3>
          <p style="color:#222;margin:0;">Menos de 5 minutos pra subir o ambiente: cria a conta, convida o time, configura pipeline e metas. Integrações via webhook são plug-and-play.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">A Vyzon integra com quais plataformas?</h3>
          <p style="color:#222;margin:0;">Sincronização nativa via webhook com Hotmart, Kiwify, Greenn, Eduzz, Cakto, Asaas, Braip, Monetizze, Notazz, Pagar.me, RD Station, Mercado Pago, Stripe e Zapier. Google Calendar, WhatsApp via Evolution API e webhooks abertos pra qualquer plataforma.</p>
          <h3 style="font-size:16px;margin:16px 0 4px;">Serve para times pequenos?</h3>
          <p style="color:#222;margin:0;">Sim. A Vyzon faz mais sentido pra operações com metas claras e pelo menos alguns vendedores, SDRs ou closers — mas também funciona muito bem pra times em crescimento.</p>
