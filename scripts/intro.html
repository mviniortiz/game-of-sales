<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>intro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@900&f[]=sentient@500i&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1920px;overflow:hidden;background:linear-gradient(180deg,#0A1020,#0C1730 55%,#0A1326);font-family:'Sora',sans-serif}
  body::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 50% 42%,transparent 42%,rgba(0,0,0,.5));pointer-events:none}
  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 110px}
  .hook{position:absolute;opacity:0}
  .hook.in{animation:rise .7s cubic-bezier(.22,1,.36,1) forwards}
  .hook.out{animation:fall .5s ease forwards}
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fall{to{opacity:0;transform:translateY(-18px)}}
  .hook .k{font-family:'JetBrains Mono',monospace;font-size:21px;letter-spacing:.24em;text-transform:uppercase;color:#A78BFA;margin-bottom:18px}
  .hook .t{font-family:'Satoshi','Sora',sans-serif;font-weight:900;font-size:62px;line-height:1.05;letter-spacing:-0.025em;color:#fff}
  .hook .t em{font-family:'Sentient',serif;font-style:italic;font-weight:500;color:#9DB4E8}
  .brandwrap{position:absolute;opacity:0;display:flex;flex-direction:column;align-items:center;gap:22px}
  .brandwrap.in{animation:rise .8s cubic-bezier(.22,1,.36,1) forwards}
  .logo{width:120px;height:120px;border-radius:32px;background:linear-gradient(135deg,#2563EB,#6D28D9);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:64px;box-shadow:0 30px 70px -24px rgba(37,99,235,.7)}
  .nm{font-family:'Satoshi','Sora',sans-serif;font-weight:900;font-size:74px;letter-spacing:-0.02em;color:#fff}
  .tag{font-size:27px;color:#8FA0C2}
  .rule{width:0;height:2px;background:linear-gradient(90deg,transparent,#2563EB,#6D28D9,transparent);margin-top:6px}
  .brandwrap.in .rule{animation:grow .9s ease .3s forwards}
  @keyframes grow{to{width:360px}}
</style></head>
<body>
  <div class="wrap">
    <div class="hook" id="h1"><div class="k">Toda agência conhece a dor</div><div class="t">Um lead <em>esfria</em><br>no WhatsApp<br>todo dia.</div></div>
    <div class="brandwrap" id="b">
      <div class="logo">V</div>
      <div class="nm">Vyzon</div>
      <div class="tag">Central Comercial com EVA</div>
      <div class="rule"></div>
    </div>
  </div>
<script>
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  (async()=>{
    const h1=document.getElementById('h1'), b=document.getElementById('b');
    await sleep(300); h1.classList.add('in');
    await sleep(2100); h1.classList.add('out');
    await sleep(450); b.classList.add('in');
  })();
</script>
</body></html>
