<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="vLeftL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#33FF9E"/>
      <stop offset="50%" stop-color="#00E37A"/>
      <stop offset="100%" stop-color="#00B289"/>
    </linearGradient>
    <linearGradient id="vRightL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#33FF9E"/>
      <stop offset="50%" stop-color="#00E37A"/>
      <stop offset="100%" stop-color="#00B289"/>
    </linearGradient>
    <linearGradient id="vCenterL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E78E0"/>
      <stop offset="100%" stop-color="#1556C0"/>
    </linearGradient>
    <linearGradient id="vHiLeftL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#66FFB3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E37A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vHiRightL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#66FFB3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E37A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowL" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glowL)">
    <polygon points="6,8 18,8 34,58 24,58" fill="url(#vLeftL)"/>
    <polygon points="46,8 58,8 40,58 30,58" fill="url(#vRightL)"/>
    <polygon points="26,22 38,22 32,44" fill="url(#vCenterL)"/>
    <polygon points="6,8 18,8 16,12 8,12" fill="url(#vHiLeftL)" opacity="0.85"/>
    <polygon points="46,8 58,8 56,12 48,12" fill="url(#vHiRightL)" opacity="0.85"/>
    <polygon points="26,22 30,22 28,28" fill="#4A90E0" opacity="0.6"/>
  </g>
</svg>
