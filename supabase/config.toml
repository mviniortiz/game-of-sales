[auth]
site_url = "https://vyzon.com.br"
additional_redirect_urls = [
  "https://vyzon.com.br/**",
  "https://www.vyzon.com.br/**",
  "http://localhost:5173/**",
  "http://localhost:8080/**"
]

[auth.email]
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Confirme seu email na Vyzon"
content_path = "./supabase/email-templates/confirm-signup.html"

[auth.email.template.recovery]
subject = "Redefinir sua senha da Vyzon"
content_path = "./supabase/email-templates/reset-password.html"

[auth.email.template.email_change]
subject = "Confirme seu novo email na Vyzon"
content_path = "./supabase/email-templates/change-email.html"

[functions.google-oauth-callback]
verify_jwt = false

[functions.google-calendar-webhook]
verify_jwt = false

[functions.twilio-voice-bridge]
verify_jwt = false

[functions.twilio-voice-status-webhook]
verify_jwt = false

[functions.twilio-voice-recording-webhook]
verify_jwt = false

[functions.evolution-message-webhook]
verify_jwt = false

[functions.evolution-backfill-webhooks]
verify_jwt = false

[functions.public-report]
verify_jwt = false

[functions.lead-webhook]
verify_jwt = false
